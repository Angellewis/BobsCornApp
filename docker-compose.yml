services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bobs-corn-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-BobsCornApp!234}"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: BobsCornApp-Back/BobsCornApp.Api/Dockerfile
    container_name: bobs-corn-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      CornRateLimit__WindowSeconds: "60"
      ConnectionStrings__DefaultConnection: "Server=db;Database=BobsCornDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-BobsCornApp!234};TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5224:8080"

  client:
    build:
      context: ./BobsCornApp-Client
      dockerfile: Dockerfile
    container_name: bobs-corn-client
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  sql-data:
